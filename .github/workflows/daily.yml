name: Daily Steam Analysis

on:
  schedule:
    - cron: '0 8 * * *'  # Daily at 8 UTC
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run analysis
        run: python scrape.py

      - name: Commit data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "📊 Daily Steam data update"
          file_pattern: "data/*"

      - name: Generate insights
        run: |
          echo "Insights generated!"
          cat data/insights.json
